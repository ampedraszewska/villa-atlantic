<?xml version="1.0" encoding="UTF-8"?>
<!--
  Villa Atlantic promotional banner
  Print size: 120 x 40 cm
  Coordinate system: 1200 x 400 (1 unit = 1 mm)
  Add 3 mm bleed in print software if required.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1200 400"
     width="1200mm" height="400mm"
     preserveAspectRatio="xMidYMid meet">

  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600&amp;family=Space+Grotesk:wght@400;500;700&amp;display=swap');

      .bg     { fill: #fefdfb; }
      .ocean  { fill: #0a4d68; }
      .coral  { fill: #e8664d; }

      .eyebrow {
        font-family: 'Space Grotesk', sans-serif;
        font-weight: 700;
        font-size: 38px;
        letter-spacing: 12px;
      }
      .logo {
        font-family: 'Fraunces', Georgia, serif;
        font-weight: 600;
        font-size: 168px;
        letter-spacing: -2px;
      }
      .url {
        font-family: 'Space Grotesk', sans-serif;
        font-weight: 500;
        font-size: 44px;
        letter-spacing: 1px;
      }
      .phone {
        font-family: 'Space Grotesk', sans-serif;
        font-weight: 600;
        font-size: 42px;
        letter-spacing: 1px;
      }
    </style>
  </defs>

  <!-- background -->
  <rect class="bg" x="0" y="0" width="1200" height="400"/>

  <!-- LEFT BLOCK: text -->
  <g transform="translate(70, 0)">
    <!-- eyebrow: RENT ME -->
    <text class="eyebrow ocean" x="0" y="120">RENT ME</text>

    <!-- logo: VILLA ATLANTIC -->
    <text class="logo coral" x="-4" y="252">VILLA ATLANTIC</text>

    <!-- url -->
    <text class="url ocean" x="0" y="320">www.atlanticvilla.net</text>
  </g>

  <!-- RIGHT BLOCK: WhatsApp -->
  <g transform="translate(910, 175)">
    <!-- WhatsApp icon (filled circle + speech bubble path) -->
    <g transform="scale(2.6) translate(0, 0)">
      <!-- Official WhatsApp logo glyph, simplified -->
      <path fill="#0a4d68" d="M16.003 0C7.166 0 0 7.166 0 16.003c0 2.825.738 5.586 2.139 8.014L0 32l8.215-2.158a16.005 16.005 0 0 0 7.788 1.987h.006C24.846 31.829 32 24.665 32 15.829 32 7.001 24.836 0 16.003 0Zm0 29.166h-.005a13.235 13.235 0 0 1-6.745-1.847l-.484-.288-4.875 1.279 1.301-4.752-.315-.501a13.234 13.234 0 0 1-2.027-7.054c0-7.305 5.946-13.252 13.255-13.252 3.541 0 6.867 1.379 9.371 3.884a13.158 13.158 0 0 1 3.881 9.376c-.002 7.306-5.948 13.255-13.357 13.255Zm7.273-9.928c-.398-.199-2.357-1.163-2.722-1.296-.365-.133-.631-.199-.897.2-.265.398-1.029 1.296-1.262 1.561-.232.266-.464.299-.862.1-.398-.199-1.683-.621-3.205-1.978-1.184-1.057-1.984-2.362-2.217-2.76-.232-.398-.025-.613.175-.811.18-.179.398-.464.598-.697.199-.232.265-.398.398-.664.133-.265.066-.498-.033-.697-.1-.199-.897-2.162-1.229-2.96-.323-.776-.652-.671-.897-.683-.232-.012-.498-.014-.764-.014a1.46 1.46 0 0 0-1.062.498c-.365.398-1.395 1.362-1.395 3.319 0 1.957 1.428 3.849 1.626 4.114.199.265 2.811 4.291 6.811 6.014.951.41 1.694.655 2.272.838.954.303 1.823.26 2.51.158.766-.114 2.357-.964 2.689-1.895.332-.93.332-1.728.232-1.895-.099-.166-.365-.265-.764-.464Z"/>
    </g>
    <!-- phone number -->
    <text class="phone ocean" x="100" y="60">+XX XXX XXX XXX</text>
  </g>

</svg>
